<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Manual-Map Analysis - Find what pe-sieve misses. Reverse engineering a manually-mapped cheat DLL that hides from the strongest public memory scanner.">
  <defs>
    <style>
      .label   { font: 600 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0ea5e9; letter-spacing: 3px; }
      .head    { font: 700 64px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .head-em { font: italic 700 64px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0ea5e9; }
      .sub     { font: 400 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569; }
      .meta    { font: 500 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #64748b; letter-spacing: 2px; }
      @media (prefers-color-scheme: dark) {
        .head { fill: #f1f5f9; }
        .sub { fill: #94a3b8; }
        .meta { fill: #64748b; }
      }
    </style>
  </defs>

  <rect width="1200" height="400" fill="transparent"/>

  <text x="600" y="80" text-anchor="middle" class="label">STATIC IMPLANT ANALYSIS</text>

  <text x="600" y="170" text-anchor="middle" class="head">Find what pe-sieve</text>

  <text x="600" y="240" text-anchor="middle">
    <tspan class="head-em">misses</tspan><tspan class="head">.</tspan>
  </text>

  <text x="600" y="295" text-anchor="middle" class="sub">Reverse engineering a manually-mapped cheat DLL that hides from</text>
  <text x="600" y="320" text-anchor="middle" class="sub">the strongest public user-mode memory scanner.</text>

  <text x="600" y="370" text-anchor="middle" class="meta">WINDOWS &#183; X64 &#183; IDA &#183; HOLLOWS HUNTER &#183; MIT LICENSE</text>
</svg>
